<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="User Registration Form for practice with validation">
    <title>Registration Form Validation</title>
    <link href="./src/output.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div id="toast" class="fixed top-5 right-5 bg-green-500 text-white font-semibold px-6 py-3 rounded-lg shadow-lg transform transition-transform duration-300 translate-x-[150%] flex items-center gap-2 z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        <span>Registration Successful!</span>
    </div>

    <main class="bg-white w-full max-w-md p-8 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold text-gray-800 text-center mb-6">Create an Account</h1>
        
        <form id="registrationForm" class="space-y-4" novalidate>
            
            <div>
                <label for="fullName" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="fullName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" placeholder="Atul Paul">
                <p id="nameError" class="text-red-500 text-sm mt-1 hidden"></p>
            </div>

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" placeholder="atul@example.com">
                <p id="emailError" class="text-red-500 text-sm mt-1 hidden"></p>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" placeholder="••••••••">
                <p id="passwordError" class="text-red-500 text-sm mt-1 hidden"></p>
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="password" id="confirmPassword" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors" placeholder="••••••••">
                <p id="confirmPasswordError" class="text-red-500 text-sm mt-1 hidden"></p>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-300 cursor-pointer mt-4">
                Register Now
            </button>
        </form>
    </main>

    <script src="app.js"></script>
</body>
</html>
